version: '3.8'

services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /var/lib/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      # TS_AUTHKEY is intentionally NOT set here.
      # Configure via: tailscale up --authkey=<key>
      # Or via the gateway web UI on first boot.

  # Wingbits (optional — uncomment to enable)
  # wingbits:
  #   image: wingbits/client:latest
  #   container_name: wingbits
  #   restart: unless-stopped
  #   ...

