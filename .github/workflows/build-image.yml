name: Build Image

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (YYYY.MM.DD)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qemu-user-static \
            binfmt-support \
            xz-utils \
            kpartx \
            wget \
            curl

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            RAW="${{ github.event.inputs.version }}"
            echo "tag=v${RAW}" >> "$GITHUB_OUTPUT"
            echo "ver=${RAW}" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF_NAME}"
            VER="${TAG#v}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "ver=${VER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run image builder
        env:
          IMAGE_VERSION: ${{ steps.version.outputs.ver }}
        run: |
          sudo IMAGE_VERSION="${IMAGE_VERSION}" bash boot/build-image.sh

      - name: Compute output filename
        id: artifacts
        run: |
          IMG=$(ls -1 sensecap-m1-gateway-*.img.xz 2>/dev/null | head -1)
          if [ -z "$IMG" ]; then
            echo "ERROR: No output image found" >&2
            exit 1
          fi
          echo "file=${IMG}" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum "$IMG" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SenseCap M1 Gateway ${{ steps.version.outputs.tag }}
          body: |
            ## SenseCap M1 Gateway Image

            ### SHA256 Checksum
            ```
            ${{ steps.artifacts.outputs.sha256 }}  ${{ steps.artifacts.outputs.file }}
            ```

            ### What happens on first boot
            On first boot, [boot/firstrun.sh](https://github.com/bitcryptic-gw/sensecap-m1-gateway/blob/main/boot/firstrun.sh) clones this repo and runs [boot/bootstrap.sh](https://github.com/bitcryptic-gw/sensecap-m1-gateway/blob/main/boot/bootstrap.sh) to provision the device automatically.

            ### Default login
            This image includes a default account for SSH access after first boot:

            - **Username:** `sensecap`
            - **Password:** `sensecap`

            You'll be required to set a new password immediately on first login —
            this is enforced, not optional. If you used Raspberry Pi Imager's
            Customisation step to set your own username/password/SSH key (not
            available via "Use custom" with this file in at least Imager v2.0.10),
            your own credentials work instead and the default account is never
            created.

            ### Setup instructions
            See the [README](https://github.com/bitcryptic-gw/sensecap-m1-gateway#readme) for full setup instructions after flashing.
          files: |
            ${{ steps.artifacts.outputs.file }}
